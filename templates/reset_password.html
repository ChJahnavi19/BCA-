<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – Maps & Memories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#fff9e6,#fffdf5);
  overflow:hidden;
  color:#2d2d2d;
}

/* Floating shapes */
body::before, body::after{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  border-radius:50%;
  z-index:-1;
  filter:blur(140px);
  animation: float 8s ease-in-out infinite alternate;
}

body::before{
  background:#ffe8a3;
  top:-200px;
  left:-200px;
}

body::after{
  background:#fff1bf;
  bottom:-200px;
  right:-200px;
  animation-delay:2s;
}

@keyframes float{
  from{ transform:translateY(0px); }
  to{ transform:translateY(40px); }
}

/* Wrapper */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  animation:fadeIn 1s ease forwards;
  opacity:0;
}

@keyframes fadeIn{
  to{ opacity:1; }
}

.card-box{
  background:white;
  padding:50px;
  border-radius:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.08);
  width:480px;
  max-width:90%;
  text-align:center;
}

.card-box h2{
  font-weight:600;
  margin-bottom:25px;
}

.input-group{
  position:relative;
}

.card-box input{
  border-radius:40px;
  padding:14px 20px;
  border:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  margin-bottom:18px;
  transition:0.3s;
}

.card-box input:focus{
  box-shadow:0 8px 25px rgba(230,184,0,0.3);
  transform:scale(1.02);
}

.btn-theme{
  width:100%;
  padding:14px;
  border-radius:40px;
  border:none;
  background:#f4c542;
  font-weight:600;
  transition:0.3s;
}

.btn-theme:hover{
  background:#e0b836;
  transform:translateY(-3px);
  box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.back-link{
  display:block;
  margin-top:20px;
  color:#c9a227;
  text-decoration:none;
}

.back-link:hover{
  text-decoration:underline;
}

.error-msg{
  color:#d9534f;
  margin-top:10px;
}

.success-msg{
  color:#28a745;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card-box">

    <h2>Reset Password</h2>

    <form method="POST" onsubmit="return validatePassword()">
      
      <input type="password" id="password" name="password"
             class="form-control"
             placeholder="New Password" required>

      <input type="password" id="confirmPassword"
             class="form-control"
             placeholder="Confirm Password" required>

      <button type="submit" class="btn-theme">
        Reset Password
      </button>
    </form>

    <div id="errorMsg" class="error-msg"></div>

    <a href="/login" class="back-link">Back to Login</a>

  </div>
</div>

<script>
function validatePassword(){
  const pass = document.getElementById("password").value.trim();
  const confirm = document.getElementById("confirmPassword").value.trim();
  const error = document.getElementById("errorMsg");

  if(pass === ""){
    error.innerText = "Password cannot be empty.";
    return false;
  }

  if(pass !== confirm){
    error.innerText = "Passwords do not match.";
    return false;
  }

  error.innerText = "";
  return true;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Gallery – Maps & Memories</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#fff9e6,#fffdf3);
  padding:50px 0;
}

/* Page Title */
.page-title{
  text-align:center;
  font-size:32px;
  font-weight:700;
  margin-bottom:40px;
  color:#5a4a00;
}

/* Upload Card */
.upload-card{
  max-width:500px;
  margin:0 auto 50px auto;
  padding:35px;
  background:#ffffff;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.upload-card input{
  border-radius:30px;
  padding:12px 18px;
}

.upload-btn{
  width:100%;
  border-radius:30px;
  padding:10px;
  background:#f4c542;
  border:none;
  font-weight:600;
  transition:0.3s;
}

.upload-btn:hover{
  background:#e0b836;
  transform:translateY(-2px);
}

/* Gallery Section */
.gallery-title{
  text-align:center;
  font-size:26px;
  font-weight:600;
  margin-bottom:30px;
  color:#5a4a00;
}

/* Image Grid */
.gallery-container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:25px;
  max-width:1100px;
  margin:0 auto;
}

/* Image Card */
.image-card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

.image-card:hover{
  transform:translateY(-8px);
}

.image-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

</style>
</head>

<body>

<div class="page-title">
  Upload Your Best Shot 
</div>

<!-- Upload Section -->
<div class="upload-card">
  <h5 class="text-center mb-4">Share with everyone. Make it unforgettable.</h5>

  <form method="POST" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Image Name" class="form-control mb-3" required>
    <input type="file" name="image" class="form-control mb-4" required>

    <button type="submit" class="upload-btn">
      Upload Image
    </button>
  </form>
</div>

<!-- Gallery Section -->
<div class="gallery-title">
  Travel Gallery
</div>

<div class="gallery-container">
  {% for image in images %}
    <div class="image-card">
      <img src="/images/{{ image }}">
    </div>
  {% endfor %}
</div>


<br>
<CENTER><a href="{{ url_for('index') }}"
   style="background:#f6e7a1;color:#5a4a00;text-decoration:none;padding:12px 28px;border-radius:30px;font-weight:600;display:inline-block;transition:0.3s;"
   onmouseover="this.style.background='#ffe58f'; this.style.transform='translateY(-2px)';"
   onmouseout="this.style.background='#f6e7a1'; this.style.transform='translateY(0)';">
Go Back
</a></CENTER>
<BR>
</body>
</html>

<!DOCTYPE html>
<html lang="en" ng-app="northTripApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northern India Trip Itinerary</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

  <style>
    body {
  font-family: "Segoe UI", cursive, sans-serif;
  background: linear-gradient(135deg,
    #ffd6e8,
    #e6ddff,
    #d7f0ff,
    #d8f8e1,
    #fff3d6
  );
  text-align: center;
  font-weight: bold;
}

    h1 {
      margin: 30px 0;
      color: #2c3e50;
      font-weight: bold;
    }
    h2 {
      margin-top: 40px;
      font-weight: bold;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }

    .card {
      transition: transform 0.3s;
      text-align: center;
      font-weight: bold;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 200px;
      width: 100%;
    }

    .card-body {
      font-weight: bold;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .card:hover { transform: scale(1.05); }

    .jammu { background-color: #fff9c4; color: #3e2723; }
    .himachal { background-color: #c8e6c9; color: #1b5e20; }
    .punjab { background-color: #ffe0b2; color: #e65100; }
    .uttarakhand { background-color: #b3e5fc; color: #01579b; }
    .haryana { background-color: #f8bbd0; color: #880e4f; }
    .delhi { background-color: #d1c4e9; color: #4a148c; }
    .uttarpradesh { background-color: #fff9c4; color: #f57f17; }
    .rajasthan { background-color: #ffccbc; color: #bf360c; }
  </style>
</head>

<body ng-controller="NorthTripController">

<h1>Northern India Trip Itinerary</h1>

<div ng-repeat="state in states">
  <h2>[[state.name]]</h2>

  <div class="container grid-container" ng-class="{
    'jammu': state.name=='Jammu & Kashmir',
    'himachal': state.name=='Himachal Pradesh',
    'punjab': state.name=='Punjab',
    'uttarakhand': state.name=='Uttarakhand',
    'haryana': state.name=='Haryana',
    'delhi': state.name=='Delhi (NCT)',
    'uttarpradesh': state.name=='Uttar Pradesh',
    'rajasthan': state.name=='Rajasthan'
  }">

    <div class="card border-primary" ng-repeat="place in state.places">
      <div class="card-body">
        <h5 class="card-title">[[place.name]]</h5>
        <p class="card-text">[[place.description]]</p>
        <p><strong>Best Time:</strong> [[place.bestTime]]</p>
      </div>
    </div>

  </div>
</div>

<script>
  var app = angular.module('northTripApp', []);

  app.config(function($interpolateProvider) {
    $interpolateProvider.startSymbol('[[');
    $interpolateProvider.endSymbol(']]');
  });

  app.controller('NorthTripController', function($scope) {
    $scope.states = [
      { name: "Jammu & Kashmir", places: [
        { name: "Srinagar", description: "Famous for Dal Lake, houseboats, and Mughal gardens. Budget: ₹10,000–₹15,000", bestTime: "March to October" },
        { name: "Gulmarg", description: "Popular hill station and skiing destination. Budget: ₹12,000–₹18,000", bestTime: "December to February" },
        { name: "Pahalgam", description: "Scenic valley with trekking and riverside walks. Budget: ₹8,000–₹12,000", bestTime: "April to June" },
        { name: "Sonamarg", description: "Known as 'Meadow of Gold', beautiful for nature walks. Budget: ₹9,000–₹14,000", bestTime: "May to September" },
        { name: "Leh-Ladakh", description: "Famous for high-altitude landscapes and monasteries. Budget: ₹20,000–₹30,000", bestTime: "June to September" },
        { name: "Vaishno Devi", description: "Important Hindu pilgrimage site. Budget: ₹5,000–₹10,000", bestTime: "Year-round" }
      ]},
      { name: "Himachal Pradesh", places: [
        { name: "Shimla", description: "Famous hill station with colonial architecture. Budget: ₹8,000–₹12,000", bestTime: "March to June" },
        { name: "Manali", description: "Popular for adventure sports and snow-capped mountains. Budget: ₹10,000–₹15,000", bestTime: "October to February" },
        { name: "Dharamshala", description: "Known for Tibetan culture and the Dalai Lama Temple. Budget: ₹7,000–₹12,000", bestTime: "March to June" },
        { name: "Kullu", description: "Famous for Kullu Valley and river rafting. Budget: ₹8,000–₹13,000", bestTime: "March to June" },
        { name: "Kasauli", description: "Serene hill town with colonial charm. Budget: ₹6,000–₹10,000", bestTime: "April to June" },
        { name: "Spiti Valley", description: "Remote desert mountain valley with monasteries. Budget: ₹15,000–₹25,000", bestTime: "June to September" }
      ]},
      { name: "Punjab", places: [
        { name: "Amritsar", description: "Home to the Golden Temple and Wagah Border. Budget: ₹6,000–₹10,000", bestTime: "October to March" },
        { name: "Chandigarh", description: "Modern city with Rock Garden and Sukhna Lake. Budget: ₹5,000–₹9,000", bestTime: "October to March" },
        { name: "Jallianwala Bagh", description: "Historic site in Amritsar. Budget: ₹3,000–₹5,000", bestTime: "October to March" },
        { name: "Patiala", description: "Famous for Qila Mubarak Palace and traditional culture. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Bathinda", description: "Known for forts and thermal power stations. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Anandpur Sahib", description: "Historical Sikh pilgrimage site. Budget: ₹4,000–₹7,000", bestTime: "October to March" }
      ]},
      { name: "Uttarakhand", places: [
        { name: "Dehradun", description: "Capital city with natural beauty and schools. Budget: ₹5,000–₹10,000", bestTime: "March to June" },
        { name: "Nainital", description: "Hill station with beautiful lakes. Budget: ₹6,000–₹12,000", bestTime: "March to June" },
        { name: "Rishikesh", description: "Yoga capital of the world and adventure hub. Budget: ₹4,000–₹8,000", bestTime: "February to April" },
        { name: "Haridwar", description: "Major Hindu pilgrimage city on Ganga. Budget: ₹3,000–₹7,000", bestTime: "February to April" },
        { name: "Mussoorie", description: "Popular hill station with scenic viewpoints. Budget: ₹6,000–₹12,000", bestTime: "March to June" },
        { name: "Jim Corbett National Park", description: "Famous wildlife sanctuary for tigers. Budget: ₹8,000–₹15,000", bestTime: "November to June" }
      ]},
      { name: "Haryana", places: [
        { name: "Kurukshetra", description: "Historical and religious city from Mahabharata times. Budget: ₹3,000–₹7,000", bestTime: "October to March" },
        { name: "Panipat", description: "Famous for historic battles and monuments. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Ambala", description: "Known for army cantonment and temples. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Sultanpur National Park", description: "Bird sanctuary near Gurgaon. Budget: ₹3,000–₹6,000", bestTime: "November to March" },
        { name: "Manesar", description: "Industrial town with resorts and lakes. Budget: ₹5,000–₹9,000", bestTime: "October to March" },
        { name: "Panipat Museum", description: "Museum displaying history of battles. Budget: ₹2,000–₹5,000", bestTime: "October to March" }
      ]},
      { name: "Delhi (NCT)", places: [
        { name: "India Gate", description: "Iconic war memorial in New Delhi. Budget: ₹2,000–₹5,000", bestTime: "October to March" },
        { name: "Red Fort", description: "Historic Mughal fort and UNESCO site. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Qutub Minar", description: "Tallest brick minaret in the world. Budget: ₹2,000–₹5,000", bestTime: "October to March" },
        { name: "Lotus Temple", description: "Famous Baháʼí House of Worship. Budget: ₹1,000–₹3,000", bestTime: "October to March" },
        { name: "Humayun's Tomb", description: "Mughal architecture masterpiece. Budget: ₹2,000–₹4,000", bestTime: "October to March" },
        { name: "Chandni Chowk", description: "Historic market famous for street food and shopping. Budget: ₹2,000–₹5,000", bestTime: "October to March" }
      ]},
      { name: "Uttar Pradesh", places: [
        { name: "Agra", description: "Home of the Taj Mahal. Budget: ₹5,000–₹10,000", bestTime: "October to March" },
        { name: "Varanasi", description: "Ancient city on the Ganges, spiritual hub. Budget: ₹4,000–₹8,000", bestTime: "October to March" },
        { name: "Lucknow", description: "Known for Nawabi culture and monuments. Budget: ₹4,000–₹8,000", bestTime: "October to March" },
        { name: "Mathura", description: "Birthplace of Lord Krishna. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Jhansi", description: "Historic city of Rani Laxmibai. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Kanpur", description: "Industrial city with historic landmarks. Budget: ₹4,000–₹7,000", bestTime: "October to March" }
      ]},
      { name: "Rajasthan", places: [
        { name: "Jaipur", description: "Pink City with forts and palaces. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Udaipur", description: "City of lakes and royal palaces. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Jaisalmer", description: "Golden city with desert forts. Budget: ₹8,000–₹15,000", bestTime: "October to March" },
        { name: "Jodhpur", description: "Blue City with Mehrangarh Fort. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Pushkar", description: "Famous for Brahma Temple and camel fair. Budget: ₹5,000–₹10,000", bestTime: "October to March" },
        { name: "Mount Abu", description: "Hill station with Dilwara Temples. Budget: ₹6,000–₹12,000", bestTime: "October to March" }
      ]}
    ];
  });
</script>

</body>
</html>

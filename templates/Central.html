<!DOCTYPE html>
<html lang="en" ng-app="centralTripApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central India Trip Itinerary</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

  <style>
    body {
  font-family: "Segoe UI", cursive, sans-serif;
  background: linear-gradient(135deg,
    #ffd6e8,
    #e6ddff,
    #d7f0ff,
    #d8f8e1,
    #fff3d6
  );
  text-align: center;
  font-weight: bold;
}

    h1 {
      margin: 30px 0;
      color: #2c3e50;
    }
    h2 {
      margin-top: 40px;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }

    .card {
      transition: transform 0.3s;
      text-align: center;
      font-weight: bold;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 200px;
      width: 100%;
    }

    .card-body {
      font-weight: bold;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .mp { background-color: #c8e6c9; color: #1b5e20; }
    .chhattisgarh { background-color: #ffe0b2; color: #e65100; }
  </style>
</head>

<body ng-controller="CentralTripController">

<h1>Central India Trip Itinerary</h1>

<div ng-repeat="state in states">
  <h2>[[state.name]]</h2>

  <div class="container grid-container" ng-class="{
    'mp': state.name=='Madhya Pradesh',
    'chhattisgarh': state.name=='Chhattisgarh'
  }">

    <div class="card border-primary" ng-repeat="place in state.places">
      <div class="card-body">
        <h5>[[place.name]]</h5>
        <p>[[place.description]]</p>
        <p><strong>Best Time:</strong> [[place.bestTime]]</p>
      </div>
    </div>

  </div>
</div>

<script>
  var app = angular.module('centralTripApp', []);

  app.config(function($interpolateProvider) {
    $interpolateProvider.startSymbol('[[');
    $interpolateProvider.endSymbol(']]');
  });

  app.controller('CentralTripController', function($scope) {
    $scope.states = [

      { name: "Madhya Pradesh", image: "madhya_pradesh_state.png", places: [
        { name: "Khajuraho", description: "Famous for UNESCO temples with erotic sculptures. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Kanha National Park", description: "Wildlife sanctuary for tigers. Budget: ₹8,000–₹15,000", bestTime: "October to June" },
        { name: "Bandhavgarh", description: "Tiger reserve and fort ruins. Budget: ₹8,000–₹14,000", bestTime: "November to June" },
        { name: "Gwalior Fort", description: "Historic hilltop fort with palaces. Budget: ₹5,000–₹10,000", bestTime: "October to March" },
        { name: "Sanchi Stupa", description: "Ancient Buddhist complex. Budget: ₹4,000–₹8,000", bestTime: "October to March" },
        { name: "Ujjain", description: "Religious city famous for Kumbh Mela. Budget: ₹4,000–₹8,000", bestTime: "January to April" }
      ]},

      { name: "Chhattisgarh", image: "chhattisgarh_state.png", places: [
        { name: "Chitrakote Falls", description: "Known as 'Niagara of India'. Budget: ₹5,000–₹10,000", bestTime: "October to March" },
        { name: "Bastar", description: "Tribal culture and forests. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Kanger Valley National Park", description: "Biodiversity hotspot with caves. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Raipur", description: "State capital with temples & parks. Budget: ₹4,000–₹8,000", bestTime: "October to March" },
        { name: "Dongargarh", description: "Famous for Maa Bamleshwari Temple. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Barnawapara Wildlife Sanctuary", description: "Rich in flora and fauna. Budget: ₹5,000–₹10,000", bestTime: "October to March" }
      ]}

    ];
  });
</script>

</body>
</html>

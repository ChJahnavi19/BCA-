<!DOCTYPE html>
<html lang="en" ng-app="eastTripApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eastern India Trip Itinerary</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

  <style>
    body {
  font-family: "Segoe UI", cursive, sans-serif;
  background: linear-gradient(135deg,
    #ffd6e8,
    #e6ddff,
    #d7f0ff,
    #d8f8e1,
    #fff3d6
  );
  text-align: center;
  font-weight: bold;
}

    h1 {
      margin: 30px 0;
      color: #2c3e50;
    }
    h2 {
      margin-top: 40px;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }
    .card {
      transition: transform 0.3s;
      border-radius: 10px;
      width: 100%;
    }
    .card:hover {
      transform: scale(1.05);
    }

    .odisha { background-color: #bbdefb; color: #0d47a1; }
    .westbengal { background-color: #f8bbd0; color: #880e4f; }
    .bihar { background-color: #c8e6c9; color: #1b5e20; }
    .jharkhand { background-color: #ffe0b2; color: #e65100; }
  </style>
</head>

<body ng-controller="EastTripController">

<h1>Eastern India Trip Itinerary</h1>

<div ng-repeat="state in states">
  <h2>[[state.name]]</h2>

  <div class="container grid-container" ng-class="{
    'odisha': state.name=='Odisha',
    'westbengal': state.name=='West Bengal',
    'bihar': state.name=='Bihar',
    'jharkhand': state.name=='Jharkhand'
  }">

    <div class="card border-primary" ng-repeat="place in state.places">
      <div class="card-body">
        <h5>[[place.name]]</h5>
        <p>[[place.description]]</p>
        <p><strong>Best Time:</strong> [[place.bestTime]]</p>
      </div>
    </div>

  </div>
</div>

<script>
  var app = angular.module('eastTripApp', []);

  app.config(function($interpolateProvider) {
    $interpolateProvider.startSymbol('[[');
    $interpolateProvider.endSymbol(']]');
  });

  app.controller('EastTripController', function($scope) {
    $scope.states = [

      { name: "Odisha", places: [
        { name: "Puri", description: "Jagannath Temple & beaches. Budget: ₹4,000–₹7,000", bestTime: "October to February" },
        { name: "Konark", description: "Sun Temple UNESCO site. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Bhubaneswar", description: "Temple city of India. Budget: ₹4,000–₹8,000", bestTime: "October to March" },
        { name: "Chilika Lake", description: "Migratory birds & boating. Budget: ₹5,000–₹9,000", bestTime: "November to February" },
        { name: "Cuttack", description: "Historic city & crafts. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Gopalpur", description: "Calm beach town. Budget: ₹5,000–₹9,000", bestTime: "October to February" }
      ]},

      { name: "West Bengal", places: [
        { name: "Kolkata", description: "Cultural capital of India. Budget: ₹5,000–₹9,000", bestTime: "October to February" },
        { name: "Darjeeling", description: "Tea gardens & Himalayas. Budget: ₹7,000–₹12,000", bestTime: "March to May" },
        { name: "Sundarbans", description: "Mangroves & Royal Bengal Tiger. Budget: ₹8,000–₹15,000", bestTime: "November to February" },
        { name: "Kalimpong", description: "Hill town & monasteries. Budget: ₹6,000–₹10,000", bestTime: "March to May" },
        { name: "Digha", description: "Popular seaside resort. Budget: ₹4,000–₹8,000", bestTime: "October to February" },
        { name: "Murshidabad", description: "Nawabi heritage sites. Budget: ₹4,000–₹7,000", bestTime: "October to March" }
      ]},

      { name: "Bihar", places: [
        { name: "Bodh Gaya", description: "Buddha’s enlightenment site. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Nalanda", description: "Ancient university ruins. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Rajgir", description: "Hot springs & hills. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Patna", description: "Capital & historical museums. Budget: ₹4,000–₹8,000", bestTime: "October to February" },
        { name: "Vaishali", description: "Ancient republic site. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Gaya", description: "Pilgrimage & heritage. Budget: ₹3,000–₹6,000", bestTime: "October to March" }
      ]},

      { name: "Jharkhand", places: [
        { name: "Ranchi", description: "City of waterfalls. Budget: ₹4,000–₹8,000", bestTime: "October to February" },
        { name: "Netarhat", description: "Queen of Chotanagpur. Budget: ₹5,000–₹9,000", bestTime: "October to March" },
        { name: "Betla National Park", description: "Wildlife & forts. Budget: ₹6,000–₹10,000", bestTime: "November to February" },
        { name: "Dassam Falls", description: "Spectacular waterfall. Budget: ₹4,000–₹7,000", bestTime: "October to February" },
        { name: "Hazaribagh", description: "Hill views & sanctuary. Budget: ₹4,000–₹8,000", bestTime: "October to March" },
        { name: "Deoghar", description: "Baidyanath Dham pilgrimage. Budget: ₹4,000–₹7,000", bestTime: "October to March" }
      ]}
    ];
  });
</script>

</body>
</html>

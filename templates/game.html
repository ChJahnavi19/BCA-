<!DOCTYPE html>
<html lang="en" ng-app="gameApp">
<head>
<meta charset="UTF-8">
<title>Guess The Word</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #fff9e6, #fff2c2);
    text-align: center;
    padding: 50px;
    color: #5a4a00;
    overflow: hidden;
}

/* Floating abstract shapes */
.shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 12s infinite ease-in-out;
}

.shape1 { width:200px; height:200px; background:#f4d97b; top:10%; left:5%; }
.shape2 { width:150px; height:150px; background:#ffe58f; bottom:15%; right:10%; animation-duration:15s; }
.shape3 { width:120px; height:120px; background:#f6e7a1; top:50%; right:20%; animation-duration:18s; }

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(180deg); }
    100% { transform: translateY(0px) rotate(360deg); }
}

h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

.game-box {
    background: #ffffff;
    padding: 50px;
    border-radius: 30px;
    display: inline-block;
    box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    width: 520px;
    position: relative;
    z-index: 10;
}

.scrambled {
    font-size: 44px;
    letter-spacing: 14px;
    margin: 30px 0;
    font-weight: bold;
    transition: 0.4s;
}

.bounce {
    animation: bounce 0.4s;
}

@keyframes bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

input {
    padding: 15px;
    font-size: 18px;
    border-radius: 14px;
    border: 2px solid #e6c45a;
    width: 260px;
    text-align: center;
    transition: 0.2s;
}

.correct { border-color:#4CAF50 !important; }
.wrong { border-color:#ff4d4d !important; animation: shake 0.3s; }

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
    100% { transform: translateX(0); }
}

button {
    background:#f6e7a1;
    color:#5a4a00;
    border:none;
    padding:12px 28px;
    border-radius:30px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:15px;
}

button:hover {
    background:#ffe58f;
    transform: translateY(-2px);
}

.stats {
    font-size:18px;
    margin-bottom:15px;
    font-weight:bold;
}

.progress {
    height:10px;
    background:#eee;
    border-radius:20px;
    margin-bottom:20px;
    overflow:hidden;
}

.progress-bar {
    height:100%;
    background:#f4d97b;
    transition: width 1s linear;
}

.game-over {
    font-size:26px;
    margin-top:20px;
}
</style>
</head>

<body ng-controller="GameController">

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<h1>Guess The Word</h1>

<div class="game-box">

<div class="stats">
Score: [[score]] | Time: [[timeLeft]]s
</div>

<div class="progress">
<div class="progress-bar" ng-style="{'width': (timeLeft/40)*100 + '%'}"></div>
</div>

<div class="scrambled" ng-class="wordClass">
[[scrambledWord]]
</div>

<input type="text"
       ng-model="userGuess"
       ng-class="inputClass"
       ng-change="liveCheck()"
       ng-keypress="$event.which === 13 && checkGuess()"
       ng-disabled="gameOver">

<br>

<button ng-click="checkGuess()" ng-disabled="gameOver">
Submit
</button>

<div>[[message]]</div>

<div class="game-over" ng-if="gameOver">
Game Over! <br> <br>
Final Score: [[score]]
<br><br>
<button ng-click="restart()">Play Again</button>
</div>

</div>

<br>
<br>
<a href="{{ url_for('index') }}"
   style="background:#f6e7a1;color:#5a4a00;text-decoration:none;padding:12px 28px;border-radius:30px;font-weight:600;display:inline-block;transition:0.3s;"
   onmouseover="this.style.background='#ffe58f'; this.style.transform='translateY(-2px)';"
   onmouseout="this.style.background='#f6e7a1'; this.style.transform='translateY(0)';">
Go Back
</a>

<div id="wordData" style="display:none;">
{{ words | tojson }}
</div>

<script>
var app = angular.module("gameApp", []);

app.config(function($interpolateProvider){
    $interpolateProvider.startSymbol('[[');
    $interpolateProvider.endSymbol(']]');
});

app.controller("GameController", function($scope, $interval){

var words = JSON.parse(document.getElementById("wordData").textContent);

$scope.score = 0;
$scope.timeLeft = 40;   // ⏳ 40 seconds now
$scope.userGuess = "";
$scope.message = "";
$scope.scrambledWord = "";
$scope.gameOver = false;
$scope.inputClass = "";
$scope.wordClass = "";

var originalWord = "";
var timer;

function shuffle(word){
    return word.split("").sort(function(){return Math.random()-0.5}).join("");
}

function generateWord(){
    originalWord = words[Math.floor(Math.random()*words.length)];
    $scope.scrambledWord = shuffle(originalWord);
    $scope.wordClass = "bounce";
    setTimeout(()=>{$scope.wordClass="";},400);
}

$scope.liveCheck = function(){
    if($scope.userGuess.length >= originalWord.length){
        if($scope.userGuess.toLowerCase() === originalWord.toLowerCase()){
            $scope.inputClass = "correct";
        } else {
            $scope.inputClass = "wrong";
        }
    } else {
        $scope.inputClass = "";
    }
};

$scope.checkGuess = function(){
    if($scope.gameOver) return;

    if($scope.userGuess.toLowerCase() === originalWord.toLowerCase()){
        $scope.score += 10;
        $scope.message = " Awesome! +10 ";
        $scope.inputClass = "correct";
        generateWord();
    } else {
        $scope.score -= 5;
        $scope.message = " Oops! -5 ";
        $scope.inputClass = "wrong";
    }
    $scope.userGuess="";
};

function startTimer(){
    timer = $interval(function(){
        $scope.timeLeft--;
        if($scope.timeLeft <= 0){
            $interval.cancel(timer);
            $scope.gameOver = true;
            $scope.scrambledWord = "GAME OVER";
        }
    },1000);
}

$scope.restart = function(){
    $scope.score = 0;
    $scope.timeLeft = 40;
    $scope.gameOver = false;
    $scope.message="";
    generateWord();
    startTimer();
};

generateWord();
startTimer();

});
</script>

</body>
</html>

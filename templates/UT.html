<!DOCTYPE html>
<html lang="en" ng-app="utTripApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Union Territories Trip Itinerary</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

  <style>
    body {
  font-family: "Segoe UI", cursive, sans-serif;
  background: linear-gradient(135deg,
    #ffd6e8,
    #e6ddff,
    #d7f0ff,
    #d8f8e1,
    #fff3d6
  );
  text-align: center;
  font-weight: bold;
}

    h1 {
      margin: 30px 0;
      color: #2c3e50;
      font-weight: bold;
    }
    h2 {
      margin-top: 40px;
      font-weight: bold;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }

    .card {
      transition: transform 0.3s;
      text-align: center;
      font-weight: bold;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 200px;
      width: 100%;
    }

    .card-body {
      font-weight: bold;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .card:hover { transform: scale(1.05); }

    .andaman { background-color: #ffe0b2; color: #e65100; }
    .chandigarh { background-color: #c8e6c9; color: #1b5e20; }
    .dadra { background-color: #f8bbd0; color: #880e4f; }
    .daman { background-color: #b3e5fc; color: #01579b; }
    .delhiUT { background-color: #d1c4e9; color: #4a148c; }
    .lakshadweep { background-color: #fff9c4; color: #f57f17; }
    .puducherry { background-color: #ffccbc; color: #bf360c; }
    .ladakh { background-color: #f0f4c3; color: #33691e; }
    .jammuUT { background-color: #fce4ec; color: #880e4f; }
  </style>
</head>

<body ng-controller="UTTripController">

<h1>Union Territories Trip Itinerary</h1>

<div ng-repeat="ut in uts">
  <h2>[[ut.name]]</h2>

  <div class="container grid-container" ng-class="{
    'andaman': ut.name=='Andaman & Nicobar Islands',
    'chandigarh': ut.name=='Chandigarh',
    'dadra': ut.name=='Dadra & Nagar Haveli',
    'daman': ut.name=='Daman & Diu',
    'delhiUT': ut.name=='Delhi (NCT)',
    'lakshadweep': ut.name=='Lakshadweep',
    'puducherry': ut.name=='Puducherry',
    'ladakh': ut.name=='Ladakh'
  }">

    <div class="card border-primary" ng-repeat="place in ut.places">
      <div class="card-body">
        <h5>[[place.name]]</h5>
        <p>[[place.description]]</p>
        <p><strong>Best Time:</strong> [[place.bestTime]]</p>
      </div>
    </div>

  </div>
</div>

<script>
  var app = angular.module('utTripApp', []);

  app.config(function($interpolateProvider) {
    $interpolateProvider.startSymbol('[[');
    $interpolateProvider.endSymbol(']]');
  });

  app.controller('UTTripController', function($scope) {
    $scope.uts = [

      { name: "Andaman & Nicobar Islands", places: [
        { name: "Havelock Island", description: "Pristine beaches and water sports. Budget: ₹12,000–₹20,000", bestTime: "October to May" },
        { name: "Cellular Jail", description: "Historic colonial prison. Budget: ₹2,000–₹5,000", bestTime: "October to May" },
        { name: "Radhanagar Beach", description: "Famous for sunset views. Budget: ₹3,000–₹7,000", bestTime: "October to May" },
        { name: "Ross Island", description: "Ruins of British settlement. Budget: ₹2,000–₹5,000", bestTime: "October to May" },
        { name: "Neil Island", description: "Quiet island getaway. Budget: ₹8,000–₹12,000", bestTime: "October to May" },
        { name: "Baratang Island", description: "Limestone caves and mangrove forests. Budget: ₹6,000–₹10,000", bestTime: "November to May" }
      ]},

      { name: "Chandigarh", places: [
        { name: "Rock Garden", description: "Sculpture garden of recycled materials. Budget: ₹1,000–₹3,000", bestTime: "October to March" },
        { name: "Sukhna Lake", description: "Man-made lake for boating and walks. Budget: ₹500–₹1,500", bestTime: "October to March" },
        { name: "Rose Garden", description: "Largest rose garden in Asia. Budget: ₹500–₹1,000", bestTime: "February to April" },
        { name: "Chandigarh Museum", description: "Art and heritage museum. Budget: ₹500–₹1,000", bestTime: "October to March" },
        { name: "Pinjore Gardens", description: "Historical Mughal gardens. Budget: ₹1,000–₹2,500", bestTime: "October to March" },
        { name: "Le Corbusier Center", description: "Architectural museum and gallery. Budget: ₹500–₹1,000", bestTime: "October to March" }
      ]},

      { name: "Dadra & Nagar Haveli", places: [
        { name: "Silvassa Gardens", description: "Botanical gardens with greenery. Budget: ₹2,000–₹4,000", bestTime: "November to February" },
        { name: "Vanganga Lake", description: "Picnic and boating spot. Budget: ₹1,500–₹3,000", bestTime: "November to February" },
        { name: "Lion Safari", description: "Wildlife safari park. Budget: ₹3,000–₹6,000", bestTime: "October to February" },
        { name: "Tribal Museum", description: "Exhibit on local tribal culture. Budget: ₹500–₹1,500", bestTime: "October to February" },
        { name: "Jungle Safari", description: "Guided tour of forests. Budget: ₹2,500–₹5,000", bestTime: "October to February" },
        { name: "Dudhni Lake", description: "Natural lake with water activities. Budget: ₹2,000–₹4,000", bestTime: "November to February" }
      ]},

      { name: "Daman & Diu", places: [
        { name: "Devka Beach", description: "Popular beach for families. Budget: ₹2,000–₹4,000", bestTime: "November to March" },
        { name: "Jampore Beach", description: "Quiet scenic beach. Budget: ₹2,500–₹5,000", bestTime: "November to March" },
        { name: "Diu Fort", description: "Historic Portuguese fort. Budget: ₹1,500–₹3,000", bestTime: "October to March" },
        { name: "St. Paul’s Church", description: "Beautiful colonial church. Budget: ₹500–₹1,500", bestTime: "October to March" },
        { name: "Naida Caves", description: "Sea caves near Diu. Budget: ₹1,500–₹3,000", bestTime: "November to March" },
        { name: "Ghoghla Beach", description: "Longest beach in Diu. Budget: ₹2,500–₹5,000", bestTime: "November to March" }
      ]},

      { name: "Delhi (NCT)", places: [
        { name: "India Gate", description: "Iconic war memorial. Budget: ₹2,000–₹5,000", bestTime: "October to March" },
        { name: "Red Fort", description: "Historic Mughal fort. Budget: ₹3,000–₹6,000", bestTime: "October to March" },
        { name: "Qutub Minar", description: "Tallest brick minaret. Budget: ₹2,000–₹5,000", bestTime: "October to March" },
        { name: "Lotus Temple", description: "Baháʼí House of Worship. Budget: ₹1,000–₹3,000", bestTime: "October to March" },
        { name: "Humayun's Tomb", description: "Mughal architecture masterpiece. Budget: ₹2,000–₹4,000", bestTime: "October to March" },
        { name: "Chandni Chowk", description: "Historic market for food and shopping. Budget: ₹2,000–₹5,000", bestTime: "October to March" }
      ]},

      { name: "Lakshadweep", places: [
        { name: "Bangaram Island", description: "Secluded paradise island. Budget: ₹15,000–₹25,000", bestTime: "October to May" },
        { name: "Agatti Island", description: "Snorkeling and water sports. Budget: ₹12,000–₹20,000", bestTime: "October to May" },
        { name: "Kadmat Island", description: "Coral reefs and scuba diving. Budget: ₹12,000–₹20,000", bestTime: "October to May" },
        { name: "Minicoy Island", description: "Lighthouse and fishing villages. Budget: ₹10,000–₹18,000", bestTime: "October to May" },
        { name: "Kavaratti Island", description: "Capital island with lagoons. Budget: ₹8,000–₹15,000", bestTime: "October to May" },
        { name: "Kalpeni Island", description: "Peaceful beaches and lagoons. Budget: ₹10,000–₹18,000", bestTime: "October to May" }
      ]},

      { name: "Puducherry", places: [
        { name: "Promenade Beach", description: "Scenic seaside promenade. Budget: ₹2,000–₹5,000", bestTime: "October to March" },
        { name: "Auroville", description: "International township and spiritual center. Budget: ₹1,500–₹4,000", bestTime: "October to March" },
        { name: "Sri Aurobindo Ashram", description: "Spiritual and meditation center. Budget: ₹500–₹1,500", bestTime: "October to March" },
        { name: "Paradise Beach", description: "Clean, quiet beach. Budget: ₹2,000–₹5,000", bestTime: "October to March" },
        { name: "Chunnambar Boat House", description: "Boating and water activities. Budget: ₹1,500–₹4,000", bestTime: "October to March" },
        { name: "Basilica of the Sacred Heart of Jesus", description: "Colonial-era church. Budget: ₹500–₹1,000", bestTime: "October to March" }
      ]},

      { name: "Ladakh", places: [
        { name: "Leh", description: "High-altitude town with monasteries. Budget: ₹20,000–₹30,000", bestTime: "June to September" },
        { name: "Pangong Lake", description: "Famous for scenic blue lake. Budget: ₹12,000–₹20,000", bestTime: "June to September" },
        { name: "Nubra Valley", description: "Desert valley with sand dunes. Budget: ₹15,000–₹25,000", bestTime: "June to September" },
        { name: "Tso Moriri Lake", description: "Remote high-altitude lake. Budget: ₹15,000–₹25,000", bestTime: "June to September" },
        { name: "Magnetic Hill", description: "Gravity-defying road. Budget: ₹2,000–₹5,000", bestTime: "June to September" },
        { name: "Thiksey Monastery", description: "Largest monastery in Ladakh. Budget: ₹2,000–₹5,000", bestTime: "June to September" }
      ]}
    ];
  });
</script>

</body>
</html>

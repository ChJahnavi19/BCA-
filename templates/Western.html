<!DOCTYPE html>
<html lang="en" ng-app="westTripApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Western India Trip Itinerary</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

  <style>
    body {
  font-family: "Segoe UI", cursive, sans-serif;
  background: linear-gradient(135deg,
    #ffd6e8,
    #e6ddff,
    #d7f0ff,
    #d8f8e1,
    #fff3d6
  );
  text-align: center;
  font-weight: bold;
}

    h1 {
      margin: 30px 0;
      color: #2c3e50;
    }
    h2 {
      margin-top: 40px;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }
    .card {
      transition: transform 0.3s;
      border-radius: 10px;
      width: 100%;
    }
    .card:hover {
      transform: scale(1.05);
    }

    .goa { background-color: #b3e5fc; color: #01579b; }
    .gujarat { background-color: #fff9c4; color: #3e2723; }
    .maharashtra { background-color: #ffe0b2; color: #e65100; }
  </style>
</head>

<body ng-controller="WestTripController">

<h1>Western India Trip Itinerary</h1>

<div ng-repeat="state in states">
  <h2>[[state.name]]</h2>

  <div class="container grid-container" ng-class="{
    'goa': state.name=='Goa',
    'gujarat': state.name=='Gujarat',
    'maharashtra': state.name=='Maharashtra'
  }">

    <div class="card border-primary" ng-repeat="place in state.places">
      <div class="card-body">
        <h5>[[place.name]]</h5>
        <p>[[place.description]]</p>
        <p><strong>Best Time:</strong> [[place.bestTime]]</p>
      </div>
    </div>

  </div>
</div>

<script>
  var app = angular.module('westTripApp', []);

  app.config(function($interpolateProvider) {
    $interpolateProvider.startSymbol('[[');
    $interpolateProvider.endSymbol(']]');
  });

  app.controller('WestTripController', function($scope) {
    $scope.states = [

      { name: "Goa", places: [
        { name: "Baga Beach", description: "Popular beach with nightlife. Budget: ₹6,000–₹12,000", bestTime: "November to February" },
        { name: "Calangute", description: "Queen of beaches. Budget: ₹6,000–₹10,000", bestTime: "November to February" },
        { name: "Anjuna", description: "Flea market and beach vibes. Budget: ₹5,000–₹9,000", bestTime: "November to February" },
        { name: "Old Goa", description: "Portuguese churches & heritage. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Dudhsagar Falls", description: "Majestic waterfall. Budget: ₹6,000–₹10,000", bestTime: "October to January" },
        { name: "Palolem Beach", description: "Calm scenic beach. Budget: ₹6,000–₹10,000", bestTime: "November to February" }
      ]},

      { name: "Gujarat", places: [
        { name: "Ahmedabad", description: "Sabarmati Ashram & heritage. Budget: ₹5,000–₹9,000", bestTime: "October to March" },
        { name: "Statue of Unity", description: "World’s tallest statue. Budget: ₹6,000–₹12,000", bestTime: "October to March" },
        { name: "Gir National Park", description: "Home of Asiatic lions. Budget: ₹8,000–₹15,000", bestTime: "December to March" },
        { name: "Somnath", description: "Famous Jyotirlinga temple. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Dwarka", description: "Krishna pilgrimage city. Budget: ₹4,000–₹7,000", bestTime: "October to March" },
        { name: "Rann of Kutch", description: "White desert festival. Budget: ₹6,000–₹12,000", bestTime: "November to February" }
      ]},

      { name: "Maharashtra", places: [
        { name: "Mumbai", description: "Financial capital & Bollywood. Budget: ₹6,000–₹12,000", bestTime: "October to February" },
        { name: "Pune", description: "Cultural & educational hub. Budget: ₹5,000–₹9,000", bestTime: "October to February" },
        { name: "Lonavala", description: "Hill station near Mumbai. Budget: ₹6,000–₹10,000", bestTime: "July to February" },
        { name: "Mahabaleshwar", description: "Hill station with viewpoints. Budget: ₹7,000–₹12,000", bestTime: "October to June" },
        { name: "Ajanta Caves", description: "UNESCO Buddhist caves. Budget: ₹5,000–₹9,000", bestTime: "October to March" },
        { name: "Shirdi", description: "Sai Baba pilgrimage. Budget: ₹4,000–₹7,000", bestTime: "October to March" }
      ]}
    ];
  });
</script>

</body>
</html>

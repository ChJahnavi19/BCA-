<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – Maps & Memories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#fff9e6,#fffdf5);
  overflow:hidden;
  color:#2d2d2d;
}

/* Floating abstract shapes */
body::before, body::after{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  border-radius:50%;
  z-index:-1;
  filter:blur(140px);
  animation: float 8s ease-in-out infinite alternate;
}

body::before{
  background:#ffe8a3;
  top:-200px;
  left:-200px;
}

body::after{
  background:#fff1bf;
  bottom:-200px;
  right:-200px;
  animation-delay:2s;
}

@keyframes float{
  from{ transform:translateY(0px); }
  to{ transform:translateY(40px); }
}

/* Centered Card */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  animation:fadeIn 1s ease forwards;
  opacity:0;
}

@keyframes fadeIn{
  to{ opacity:1; }
}

.card-box{
  background:white;
  padding:50px;
  border-radius:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.08);
  width:450px;
  max-width:90%;
  text-align:center;
}

.card-box h2{
  font-weight:600;
  margin-bottom:25px;
}

.card-box input{
  border-radius:40px;
  padding:14px 20px;
  border:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  margin-bottom:20px;
  transition:0.3s;
}

.card-box input:focus{
  box-shadow:0 8px 25px rgba(230,184,0,0.3);
  transform:scale(1.02);
}

.btn-theme{
  width:100%;
  padding:14px;
  border-radius:40px;
  border:none;
  background:#f4c542;
  font-weight:600;
  transition:0.3s;
}

.btn-theme:hover{
  background:#e0b836;
  transform:translateY(-3px);
  box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.error-msg{
  color:#d9534f;
  margin-top:10px;
}

.success-msg{
  color:#28a745;
  margin-top:10px;
}

.back-link{
  display:block;
  margin-top:20px;
  color:#c9a227;
  text-decoration:none;
}

.back-link:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card-box">

    <h2>Forgot Password</h2>

    <form method="POST">
      <input type="email" name="email" class="form-control"
             placeholder="Enter your registered email" required>

      <button type="submit" class="btn-theme">
        Continue
      </button>
    </form>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if message %}
    <div class="success-msg">{{ message }}</div>
    {% endif %}

    <a href="/login" class="back-link">Back to Login</a>

  </div>
</div>

</body>
</html>

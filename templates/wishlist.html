<!DOCTYPE html>
<html lang="en" ng-app="wishlistApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Wishlist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

<style>
:root{
  --bg-main:#fff9e6;
  --card-bg:#fffdf4;
  --primary:#f4d97b;
  --primary-deep:#e6c45a;
  --border-soft:#f1e2b5;
  --text-main:#5a4a00;
  --shadow:rgba(230,196,90,0.25);
}

body {
  font-family: "Poppins", sans-serif;
  background: var(--bg-main);
  font-weight: 600;
  padding-bottom: 60px;
  color: var(--text-main);
}

/* Main container */
.wishlist-container {
  max-width: 750px;
  margin: 60px auto;
  padding: 35px;
  background: var(--card-bg);
  border-radius: 24px;
  box-shadow: 0 20px 50px var(--shadow);
  border: 1px solid var(--border-soft);
}

/* Inputs */
.form-control {
  border-radius: 14px;
  border: 1px solid var(--border-soft);
  padding: 12px;
}

.form-control:focus{
  border-color: var(--primary-deep);
  box-shadow: 0 0 0 3px var(--shadow);
}

/* Entry cards */
.entry-card {
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 12px 30px var(--shadow);
  border: 1px solid var(--border-soft);
  background: var(--card-bg);
  transition: 0.25s ease;
}

.entry-card:hover {
  transform: translateY(-6px);
}

/* Buttons */
.btn-success{
  background: var(--primary) !important;
  border: none !important;
  color: var(--text-main) !important;
  font-weight: 700;
  border-radius: 12px;
}

.btn-success:hover{
  background: var(--primary-deep) !important;
}

.delete-btn {
  background: var(--primary-deep);
  border: none;
  color: #fff;
  font-weight: bold;
  border-radius: 10px;
  padding: 6px 16px;
}

.delete-btn:hover{
  background: #d4b146;
}
</style>
</head>

<body ng-controller="WishlistController">

<div class="wishlist-container">
  <h2 class="text-center mb-4">🌏 My Travel Wishlist</h2>

  <form ng-submit="addItem()">
    <input class="form-control mb-3" ng-model="item.place" placeholder="Place" required>
    <input class="form-control mb-3" ng-model="item.experience" placeholder="Experience">
    <textarea class="form-control mb-3" ng-model="item.notes" placeholder="Notes" rows="4"></textarea>

    <div class="text-center">
      <button class="btn btn-success">Add to Wishlist</button>
    </div>
  </form>

  <hr class="my-4">

  <div ng-if="wishlist.length === 0" class="text-center text-muted">
    No wishlist items yet
  </div>

  <div ng-repeat="w in wishlist" class="entry-card">

    <div>
      <strong>Place:</strong> [[w.place]] <br><br>
      <strong>Experience:</strong> [[w.experience || "N/A"]] <br><br>
      <strong>Notes:</strong> [[w.notes || "N/A"]]
    </div>

    <div class="text-end mt-3">
      <button class="delete-btn" ng-click="deleteItem(w.id)">
        Delete 🗑
      </button>
    </div>
  </div>
</div>

<script>
var app = angular.module("wishlistApp", []);

app.config(function($interpolateProvider) {
  $interpolateProvider.startSymbol('[[');
  $interpolateProvider.endSymbol(']]');
});

app.controller("WishlistController", function($scope, $http) {

  $scope.wishlist = [];
  $scope.item = {};

  function loadWishlist() {
    $http.get("/api/wishlist").then(function(res) {
      $scope.wishlist = res.data;
    }).catch(function() {
      console.log("API not available");
    });
  }

  loadWishlist();

  $scope.addItem = function() {
    $http.post("/api/wishlist", $scope.item).then(function() {
      loadWishlist();
      $scope.item = {};
    });
  };

  $scope.deleteItem = function(id) {
    if (confirm("Delete this wishlist item?")) {
      $http.delete("/api/wishlist/" + id).then(function() {
        $scope.wishlist = $scope.wishlist.filter(function(w) {
          return w.id !== id;
        });
      });
    }
  };

});
</script>

</body>
</html>
